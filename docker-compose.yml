version: "3.8"

services:

  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: whaticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 88377dd26df9f1f84a7435183db6fbf2
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass whaticket123
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    depends_on:
      - postgres
      - redis

    environment:
      NODE_ENV: production

      BACKEND_URL: https://api-chat.dantas.tec.br
      FRONTEND_URL: https://chat.dantas.tec.br

      PROXY_PORT: 8080
      PORT: 8080

      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: 88377dd26df9f1f84a7435183db6fbf2
      DB_NAME: whaticket

      JWT_SECRET: kZaOTd+YZpjRUyyuQUpigJaEMk4vcW4YOymKPZX0Ts8=
      JWT_REFRESH_SECRET: dBSXqFg9TaNUEDXVp6fhMTRLBysP+j2DSqf7+raxD3A=

      REDIS_URI: redis://:whaticket123@redis:6379

      USER_LIMIT: 10000
      CONNECTIONS_LIMIT: 100000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    environment:
      REACT_APP_BACKEND_URL: https://api-chat.dantas.tec.br

    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: